# Section 2.1 — README: Monorepo, no composition - wrong manifest
# This manifest is wrong because it has spec wrong and version wrong (must follow semantic versioning) 
spec: spec-wrong
specVersion: 1.0.0
name: name
displayName: display-name
version: version-wrong
description: description

parameters:
  - key: environment
    type: string
    required: true
    validation:
      allowedValues: [ dev, staging, prod ]
    ui:
      group: General Configuration
      label: Environment
      description: Deployment stage for this data product.
      formType: dropdown

  - key: retentionDays
    type: integer
    default: 90
    validation:
      min: 1
      max: 3650
    ui:
      group: Storage
      label: Data retention (days)
      formType: number

protectedResources:
  - path: infrastructure/core/**
  - path: README.md

instantiation:
  strategy: monorepo
